proxy: "http://mihomo:7890"

user_system:
  db_type: "postgres"
  db_url: "postgresql://user:password@postgres:5432/toolbox?sslmode=disable"
  cloudflare_secret: ""
  smtp:
    smtp_addr: ""
    smtp_port: 25
    smtp_mail: ""
    smtp_pass: ""
    mail_name: ""
    timeout_seconds: 10
  session_sign_token: ""
  auth_provider: "kratos" # kratos only
  auth_proxy_enabled: false # enable when backend is behind Oathkeeper
  auth_proxy_trusted_header: "X-Auth-Proxy-Secret"
  auth_proxy_trusted_value: ""
  auth_proxy_subject_header: "X-Kratos-Identity-Id"
  auth_proxy_name_header: "X-User-Name"
  auth_proxy_email_header: "X-User-Email"
  auth_proxy_email_verified_header: "X-User-Email-Verified"
  auth_proxy_user_id_header: "X-User-Id"
  kratos_public_url: "" # required when auth_provider=kratos
  kratos_admin_url: "" # required when auth_provider=kratos
  kratos_request_timeout_seconds: 10
  kratos_session_header: "X-Session-Token"
  kratos_session_cookie: "ory_kratos_session"
  kratos_auto_link_by_email: true
  kratos_auto_provision_user: true
  avatar_save_dir: "avatars"
  frontend_url: ""
  social_platform_verify_token: ""

mongodb:
  url: "mongodb://user:pass@mongo"
  db: "collections"
  suite: "suite"
  mysekai: "mysekai"
  private_api_secret: "Bearer "
  private_api_user_agent: ""

redis:
  host: "localhost"
  port: 6379
  password: ""   # 为空表示无密码

webhook:
  jwt_secret: ""
  enabled: true

oauth2:
  provider: "hydra" # hydra only
  hydra_public_url: "http://hydra-public:4444" # backend internal call target
  hydra_browser_url: "" # optional browser-facing public entrypoint; defaults to hydra_public_url
  hydra_admin_url: "http://hydra-admin:4445"
  hydra_client_id: ""
  hydra_client_secret: ""
  hydra_request_timeout_seconds: 10

backend:
  host: "0.0.0.0"
  port: 6666
  ssl: false
  ssl_cert: "fullchain.cer"
  ssl_key: "com.key"
  auto_migrate: false
  shutdown_timeout_seconds: 10
  log_level: "INFO"
  main_log_file: "main.log"
  access_log: "[${time}] ${status} - ${latency} ${method} ${path}\n"
  access_log_path: "access.log"
  enable_trust_proxy: true
  trusted_proxies:
    - "127.0.0.0/8"
    - "::1/128"
    - "192.168.0.0/16"
    - "172.16.0.0/12"
    - "100.64.0.0/10"
    - "10.0.0.0/8"
  proxy_header: "X-Forwarded-For"

third_party_data_provider:
  endpoint_8823: ""
  secret_8823: ""
  endpoint_sakura: ""
  secret_sakura: ""
  endpoint_resona: ""
  secret_resona: ""
  endpoint_luna: ""
  secret_luna: ""

sekai_api:
  api_endpoint: ""
  api_token: ""

haruki_proxy:
  user_agent: "HarukiProxy"
  version: "v1.7.0"
  secret: ""
  unpack_key: ""

sekai_client:
  en_server_api_host: ""
  en_server_aes_key: ""
  en_server_aes_iv: ""
  jp_server_api_host: ""
  tw_server_api_host: ""
  kr_server_api_host: ""
  cn_server_api_host: ""
  other_server_aes_key: ""
  other_server_aes_iv: ""
  jp_server_inherit_token: ""
  en_server_inherit_token: ""
  jp_server_app_version_url: ""
  en_server_app_version_url: ""
  jp_server_inherit_client_headers:
    Host: ""
  en_server_inherit_client_headers:
    Host: ""
  suite_remove_keys:
    - "userInherit"
    - "userMaterials"
    - "userActionSets"
    - "userInformations"
    - "userProfileHonors"
    - "userCustomProfiles"
    - "userEventExchanges"
    - "userMissionStatuses"
    - "userBillingShopItems"
    - "userReleaseConditions"
    - "userCostume3dStatuses"
    - "userCostume3dShopItems"
    - "userCustomProfileCards"
    - "userUnitEpisodeStatuses"
    - "userCustomProfileGachas"
    - "userEventEpisodeStatuses"
    - "userSpecialEpisodeStatuses"
    - "userCustomProfileResources"
    - "userArchiveEventEpisodeStatuses"
    - "userCustomProfileResourceUsages"
    - "userCharacterProfileEpisodeStatuses"


others:
  public_api_allowed_keys:
    - "userDecks"
    - "userCards"
    - "userAreas"
    - "userHonors"
    - "userMusics"
    - "userEvents"
    - "upload_time"
    - "userProfile"
    - "userCharacters"
    - "userWorldBlooms"
    - "userBondsHonors"
    - "userMusicResults"
    - "userMysekaiGates"
    - "userProfileHonors"
    - "userMysekaiCanvases"
    - "userRankMatchSeasons"
    - "userMysekaiMaterials"
    - "userMusicAchievements"
    - "userMysekaiCharacterTalks"
    - "userWorldBloomSupportDecks"
    - "userChallengeLiveSoloDecks"
    - "userChallengeLiveSoloStages"
    - "userChallengeLiveSoloResults"
    - "userChallengeLiveSoloHighScoreRewards"
    - "userMysekaiFixtureGameCharacterPerformanceBonuses"
