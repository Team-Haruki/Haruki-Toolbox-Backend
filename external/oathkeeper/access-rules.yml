- id: hydra-public-openid
  match:
    url: <http|https>://<[^/]+>/.well-known/<.*>
    methods: [GET]
  upstream:
    url: http://hydra:4444
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

- id: hydra-public-oauth
  match:
    url: <http|https>://<[^/]+>/<oauth2/auth|oauth2/token|oauth2/revoke|oauth2/jwks.json|userinfo>
    methods: [GET, POST]
  upstream:
    url: http://hydra:4444
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

